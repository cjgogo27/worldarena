# ============================================================
# DeepSpeed ZeRO-2 Configuration for ABot-PhysWorld Training
# Optimized for full-parameter SFT of Wan2.1-I2V-14B-480P
# ============================================================
# Adjust num_processes to match your GPU count.
# For multi-node training, update num_machines and use
# accelerate launch with --num_machines and --machine_rank.
# ============================================================
compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  gradient_accumulation_steps: 1
  # ZeRO-2: shards optimizer states + gradients to reduce VRAM
  zero_stage: 2
  offload_optimizer_device: none
  offload_param_device: none
  zero3_init_flag: false
distributed_type: DEEPSPEED
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: bf16
# Single machine setup (adjust for your environment)
num_machines: 1
# Number of GPUs (adjust to match your hardware)
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
